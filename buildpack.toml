api = "0.7"

[buildpack]
  description = "A Cloud Native Buildpack that provides/does nothing. For testing only."
  homepage = "https://github.com/paketo-buildpacks/pipeline-builder-canary"
  id = "paketo-buildpacks/pipeline-builder-canary"
  keywords = ["nothing"]
  name = "Paketo Buildpack for Pipeline Builder Canary"
  version = "{{.version}}"

  [[buildpack.licenses]]
    type = "Apache-2.0"
    uri = "https://github.com/paketo-buildpacks/pipeline-builder-canary/blob/main/LICENSE"

[metadata]
  include-files = ["LICENSE", "NOTICE", "README.md", "linux/amd64/bin/build", "linux/amd64/bin/detect", "linux/amd64/bin/main", "linux/arm64/bin/build", "linux/arm64/bin/detect", "linux/arm64/bin/main", "buildpack.toml"]
  pre-package = "scripts/build.sh"

  [[metadata.dependencies]]
    cpes = ["cpe:2.3:a:apache:maven:3.9.14:*:*:*:*:*:*:*"]
    id = "maven"
    name = "Apache Maven"
    purl = "pkg:generic/apache-maven@3.9.14"
    sha256 = "126ed3233e569bd0add9e889d226139acd3de9005876a01fe6108fbf4246f515"
    source = "https://repo1.maven.org/maven2/org/apache/maven/apache-maven/3.9.14/apache-maven-3.9.14-src.tar.gz"
    source-sha256 = "09cc6ae6fd22c16f3fbb6bf4d730ad02eb53e78a3af35fd45a77cdf369853e7a"
    stacks = ["io.buildpacks.stacks.bionic", "io.paketo.stacks.tiny", "*"]
    uri = "https://repo1.maven.org/maven2/org/apache/maven/apache-maven/3.9.14/apache-maven-3.9.14-bin.tar.gz"
    version = "3.9.14"

    [[metadata.dependencies.licenses]]
      type = "Apache-2.0"
      uri = "https://www.apache.org/licenses/"

[[stacks]]
  id = "io.buildpacks.stacks.bionic"

[[stacks]]
  id = "io.paketo.stacks.tiny"

[[stacks]]
  id = "*"

[[targets]]
  arch = "amd64"
  os = "linux"

[[targets]]
  arch = "arm64"
  os = "linux"
